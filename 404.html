<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | System Error</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>

    <style>
        /* === TEMA CLARO (Padrão) === */
        :root {
            --bg-body: #f4f4f4;
            --text-primary: #161616;
            --text-secondary: #525252;
            --accent: #0f62fe;
            --bg-grid: #e0e0e0;
        }

        /* === TEMA ESCURO (.dark-theme) === */
        html.dark-theme {
            --bg-body: #161616;
            --text-primary: #f4f4f4;
            --text-secondary: #c6c6c6;
            --accent: #4589ff;
            --bg-grid: #393939;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .container-404 {
            max-width: 600px;
            padding: 2rem 2rem 2rem 3rem;
            border-left: 3px solid var(--accent);
            animation: systemBoot 0.4s ease-out forwards;
        }

        .mono-tag {
            font-family: 'IBM Plex Mono', monospace;
            color: var(--accent);
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            display: block;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 300;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Botão de Retorno */
        .btn-return {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--bg-grid);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-return:hover {
            border-color: var(--accent);
            color: var(--accent);
            background-color: rgba(15, 98, 254, 0.05);
            transform: translateY(-2px);
        }

        /* Efeito de hover muda levemente no dark mode */
        html.dark-theme .btn-return:hover {
            background-color: rgba(69, 137, 255, 0.05);
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: clamp(3rem, 8vw, 5rem);
            background-color: var(--accent);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        @keyframes systemBoot {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .container-404 {
                padding: 2rem;
                margin: 0 1.5rem;
                border-left: none;
                border-top: 3px solid var(--accent);
            }
        }
    </style>
</head>
<body>

    <div class="container-404">
        <span class="mono-tag">[SYSTEM_FAULT] // ERR_CODE: 404</span>
        
        <h1>404<span class="cursor"></span></h1>
        
        <p>A entropia venceu. O diretório ou arquivo que você tentou acessar não existe nesta linha do tempo do servidor ou foi realocado.</p>
        
        <a href="https://jonasguinami.github.io/Curriculo/" class="btn-return">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            EXEC ./RETURN_HOME.sh
        </a>
    </div>

</body>
</html>
